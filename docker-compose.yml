# Déploiement de référence (mono-instance). Adaptez les secrets avant la prod.
#
#   APP_KEY=base64:...   docker compose up -d --build
#
# Multi-réplicas / HA : mettez RUN_MIGRATIONS=false sur le service `app`, désactivez
# le scheduler sur les réplicas supplémentaires (RUN_SCHEDULER=false), et lancez les
# migrations une seule fois via :   docker compose run --rm migrate

services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${DB_DATABASE:-dalibi}
      POSTGRES_USER: ${DB_USERNAME:-dalibi}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-change-me}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME:-dalibi} -d ${DB_DATABASE:-dalibi}"]
      interval: 10s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  app:
    build: .
    depends_on:
      db:
        condition: service_healthy
    environment:
      APP_ENV: production
      APP_DEBUG: "false"
      APP_KEY: ${APP_KEY:?APP_KEY requis (php artisan key:generate --show)}
      APP_URL: ${APP_URL:-http://localhost:8080}
      DB_CONNECTION: pgsql
      DB_HOST: db
      DB_PORT: "5432"
      DB_DATABASE: ${DB_DATABASE:-dalibi}
      DB_USERNAME: ${DB_USERNAME:-dalibi}
      DB_PASSWORD: ${DB_PASSWORD:-change-me}
      QUEUE_CONNECTION: database
      # Mono-instance : migre + seed les données de référence au démarrage.
      RUN_MIGRATIONS: ${RUN_MIGRATIONS:-true}
      RUN_SCHEDULER: ${RUN_SCHEDULER:-true}
      RUN_QUEUE: ${RUN_QUEUE:-true}
    ports:
      - "${APP_PORT:-8080}:80"
    volumes:
      # Persistance des fichiers applicatifs (logos, filigranes, archives, photos, sauvegardes).
      - app_storage:/var/www/html/storage/app
    restart: unless-stopped

  # Tâche one-shot de migration (recommandée en multi-réplicas).
  #   docker compose run --rm migrate
  migrate:
    build: .
    profiles: ["tools"]
    depends_on:
      db:
        condition: service_healthy
    environment:
      APP_ENV: production
      APP_KEY: ${APP_KEY:?APP_KEY requis}
      DB_CONNECTION: pgsql
      DB_HOST: db
      DB_PORT: "5432"
      DB_DATABASE: ${DB_DATABASE:-dalibi}
      DB_USERNAME: ${DB_USERNAME:-dalibi}
      DB_PASSWORD: ${DB_PASSWORD:-change-me}
      RUN_MIGRATIONS: "true"
      SEED_REFERENCE: "true"
      RUN_SCHEDULER: "false"
      RUN_QUEUE: "false"
    command: ["true"]
    restart: "no"

volumes:
  pgdata:
  app_storage:
