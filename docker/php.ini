; Configuration PHP applicative (production)
memory_limit = 512M
upload_max_filesize = 60M
post_max_size = 80M
max_execution_time = 120
expose_php = Off

; OPcache (performances en production)
opcache.enable = 1
opcache.enable_cli = 0
opcache.memory_consumption = 128
opcache.interned_strings_buffer = 16
opcache.max_accelerated_files = 12000
opcache.validate_timestamps = 0

; JIT (gain de performances CPU en production)
opcache.jit = tracing
opcache.jit_buffer_size = 64M

; Durcissement (production)
display_errors = Off
display_startup_errors = Off
log_errors = On
; Empêche l'exécution d'un fichier arbitraire comme PHP via le path-info (uploads, etc.)
cgi.fix_pathinfo = 0
; Pas d'inclusion de fichiers distants
allow_url_include = Off
