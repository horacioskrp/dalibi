; Surcharge du pool php-fpm pour exécution non-root + Kubernetes.
[www]
; Exécution non-root : pas de bascule d'utilisateur (le master tourne déjà en www-data).
listen = 127.0.0.1:9000

; Transmet les variables d'environnement du conteneur aux workers PHP (12-factor).
clear_env = no

; Logs des workers vers la sortie standard (collectés par Docker/Kubernetes).
catch_workers_output = yes
decorate_workers_output = no

; Évite les warnings « cannot set rlimit » en environnement contraint.
rlimit_files = 8192
